name: chore
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
      sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_ioc: ^2.2.0
  flutter_ioc_get_it: ^1.3.0
  format: ^1.6.0
  intl: ^0.20.2
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/fonts/
    - assets/images/

flutter_native_splash:
    color: "#ffffff"
    image: assets/images/logo.png